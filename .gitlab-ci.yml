deploy:gameserver:
  stage: deploy
  image: alpine/k8s:1.28.2
  tags:
    - runner
  needs:
    - build:gameserver
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
    - kubectl version --client
  script:
    - cd ./kubernetes/app
    - sed -i "s|CI_COMMIT_SHA|$CI_COMMIT_SHA|g" gameserver-workload.yaml
    - kubectl apply -f gameserver-workload.yaml
    - kubectl rollout status deployment/gameserver -n newtopia-app --timeout=300s
  after_script:
    - |
      if [ "$CI_JOB_STATUS" == "failed" ]; then
        echo "=== Deployment failed, starting rollback ==="

        # Get previous revision
        PREVIOUS_REVISION=$(kubectl rollout history deployment/gameserver -n newtopia-app | tail -n 2 | head -n 1 | awk '{print $1}')
        echo "Rolling back to revision: $PREVIOUS_REVISION"

        # Rollback to previous version
        kubectl rollout undo deployment/gameserver -n newtopia-app
        kubectl rollout status deployment/gameserver -n newtopia-app --timeout=300s

        echo "=== Rollback completed ==="
        echo "=== Failure Analysis ==="

        # Get pod logs for debugging
        echo "--- Pod Status ---"
        kubectl get pods -n newtopia-app -l app=gameserver

        echo "--- Recent Events ---"
        kubectl get events -n newtopia-app --sort-by='.lastTimestamp' | tail -20

        echo "--- Failed Pod Logs ---"
        FAILED_PODS=$(kubectl get pods -n newtopia-app -l app=gameserver --field-selector=status.phase!=Running -o jsonpath='{.items[*].metadata.name}')
        for pod in $FAILED_PODS; do
          echo "=== Logs for $pod ==="
          kubectl logs $pod -n newtopia-app --tail=50 || echo "No logs available for $pod"
          echo "=== Describe $pod ==="
          kubectl describe pod $pod -n newtopia-app
        done

        echo "=== Deployment Description ==="
        kubectl describe deployment/gameserver -n newtopia-app
      fi

