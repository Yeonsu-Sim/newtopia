stages: 
  - test
  - build
  - deploy

variables:
  FRONTEND_DOCKER_IMAGE: "$DOCKER_HUB_USER/frontend-app"
  GAMESERVER_DOCKER_IMAGE: "$DOCKER_HUB_USER/gameserver-app"
  # Data pipe line 쪽아직 올라온게 없어서 
  # DATA_DOCKER_IMAGE: "$DOCKER_HUB_USER/data-app"
  NEWS_CRAWLER_DOCKER_IMAGE: "$DOCKER_HUB_USER/crawler-app"
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

test:connection:
  stage: test
  image: alpine:latest
  script:
    - echo "CI/CD 파이프라인 테스트"
    - echo "커밋:" $CI_COMMIT_SHA
  tags:
    - runner

build:gameserver:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - runner
  # rules:
  #   # only master 랑 똑같이 브랜치가 master일 때만 동작 
  #   - if: '$CI_COMMIT_BRANCH == "master"'
  #   - changes:
  #     - gameserver/**
  #   - when: never
  rules:
  - if: '$CI_COMMIT_BRANCH == "master"'
    changes:
      - "gameserver/**/*"
    when: on_success
  - when: never
  variables:
    GIT_STRATEGY: clone
    DOCKER_BUILDKIT: 1
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n $DOCKER_HUB_USER:$DOCKER_HUB_TOKEN | base64)\"}}}" > /kaniko/.docker/config.json
    - echo "현재 작업 디렉토리 확인:"
    - pwd
    - ls -al
    - echo "Git 정보 확인:"
    - git log --oneline -n 5 || echo "Git 로그를 확인할 수 없습니다."
    - echo "gameserver 디렉토리 확인"
    - ls -la gameserver/ || echo "gameserver 디렉토리가 없습니다."
  script:
    - cd gameserver
    - echo "Backend 빌드 시작 "
    - echo "빌드 컨텍스트 확인.."
    - ls -la
    
    # Dockerfile 확인
    - if [ ! -f Dockerfile ]; then echo "❌  Dockerfile이 없습니다!"; exit 1; fi
    - echo "✅ Dockerfile 발견"

    # Docker build
    - /kaniko/executor
        --context .
        --dockerfile Dockerfile
        --destination $GAMESERVER_DOCKER_IMAGE:$CI_COMMIT_SHA
        --destination $GAMESERVER_DOCKER_IMAGE:latest 

    - echo "Gameserver build & push completed "
