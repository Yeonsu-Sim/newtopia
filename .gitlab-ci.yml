stages:
  - test
  - build
  - deploy

variables:
  FRONTEND_DOCKER_IMAGE: "$DOCKER_HUB_USER/frontend-app"
  GAMESERVER_DOCKER_IMAGE: "$DOCKER_HUB_USER/gameserver-app"
  NEWS_CRAWLER_DOCKER_IMAGE: "$DOCKER_HUB_USER/crawler-app"
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

# =========================
# 공통 앵커
# =========================
.kaniko_base: &kaniko_base
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags: [runner]
  variables:
    GIT_STRATEGY: clone
    DOCKER_BUILDKIT: "1"
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n $DOCKER_HUB_USER:$DOCKER_HUB_TOKEN | base64)\"}}}" > /kaniko/.docker/config.json

.kube_base: &kube_base
  image: alpine/k8s:1.28.2
  tags: [runner]
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
    - kubectl version --client

# =========================
# FRONTEND (Build/Deploy)
# =========================

# Build - 자동 (변경 있을 때만 생성/실행)
build:frontend:auto:
  stage: build
  <<: *kaniko_base
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - "frontend/**/*"
      when: on_success
    - when: never
  script:
    - cd frontend
    - /kaniko/executor
        --context .
        --dockerfile Dockerfile
        --destination $FRONTEND_DOCKER_IMAGE:$CI_COMMIT_SHA
        --destination $FRONTEND_DOCKER_IMAGE:latest
        --build-arg NGINX_CONF=$NGINX_CONF
        --cache=true
        --cache-repo $FRONTEND_DOCKER_IMAGE-cache
        --cache-ttl=300h
        --snapshotMode=redo
        --cache-copy-layers

# Build - 수동 (버튼 항상 노출)
build:frontend:manual:
  stage: build
  <<: *kaniko_base
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never
  script:
    - cd frontend
    - /kaniko/executor
        --context .
        --dockerfile Dockerfile
        --destination $FRONTEND_DOCKER_IMAGE:$CI_COMMIT_SHA
        --destination $FRONTEND_DOCKER_IMAGE:latest
        --build-arg NGINX_CONF=$NGINX_CONF
        --cache=true
        --cache-repo $FRONTEND_DOCKER_IMAGE-cache
        --cache-ttl=300h
        --snapshotMode=redo
        --cache-copy-layers

# Deploy - 자동 (변경 + 자동 빌드 성공 시)
deploy:frontend:auto:
  stage: deploy
  <<: *kube_base
  needs:
    - job: build:frontend:auto
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - "frontend/**/*"
      when: on_success
    - when: never
  script:
    - cd ./kubernetes/app
    - sed -i "s|CI_COMMIT_SHA|$CI_COMMIT_SHA|g" frontend-workload.yaml
    - kubectl apply -f frontend-workload.yaml
    - kubectl rollout status deployment/frontend -n newtopia-app --timeout=300s

# Deploy - 수동 (빌드 스킵돼도 버튼 노출)
deploy:frontend:manual:
  stage: deploy
  <<: *kube_base
  needs:
    - job: build:frontend:auto
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never
  script:
    - cd ./kubernetes/app
    - sed -i "s|CI_COMMIT_SHA|$CI_COMMIT_SHA|g" frontend-workload.yaml
    - kubectl apply -f frontend-workload.yaml
    - kubectl rollout status deployment/frontend -n newtopia-app --timeout=300s

# =========================
# GAMESERVER (Build/Deploy)
# =========================

build:gameserver:auto:
  stage: build
  <<: *kaniko_base
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - "gameserver/**/*"
      when: on_success
    - when: never
  script:
    - cd gameserver
    - /kaniko/executor
        --context .
        --dockerfile Dockerfile
        --destination $GAMESERVER_DOCKER_IMAGE:$CI_COMMIT_SHA
        --destination $GAMESERVER_DOCKER_IMAGE:latest
        --cache=true
        --cache-repo $GAMESERVER_DOCKER_IMAGE-cache
        --cache-ttl=300h
        --snapshotMode=redo
        --cache-copy-layers

build:gameserver:manual:
  stage: build
  <<: *kaniko_base
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never
  script:
    - cd gameserver
    - /kaniko/executor
        --context .
        --dockerfile Dockerfile
        --destination $GAMESERVER_DOCKER_IMAGE:$CI_COMMIT_SHA
        --destination $GAMESERVER_DOCKER_IMAGE:latest
        --cache=true
        --cache-repo $GAMESERVER_DOCKER_IMAGE-cache
        --cache-ttl=300h
        --snapshotMode=redo
        --cache-copy-layers

deploy:gameserver:auto:
  stage: deploy
  <<: *kube_base
  needs:
    - job: build:gameserver:auto
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - "gameserver/**/*"
      when: on_success
    - when: never
  script:
    - cd ./kubernetes/app
    - sed -i "s|CI_COMMIT_SHA|$CI_COMMIT_SHA|g" gameserver-workload.yaml
    - kubectl apply -f gameserver-workload.yaml
    - kubectl rollout status deployment/gameserver -n newtopia-app --timeout=300s
  after_script:
    - |
      if [ "$CI_JOB_STATUS" == "failed" ]; then
        echo "=== Deployment failed, starting rollback ==="
        kubectl rollout undo deployment/gameserver -n newtopia-app
        kubectl rollout status deployment/gameserver -n newtopia-app --timeout=300s
        echo "--- Pod Status ---"
        kubectl get pods -n newtopia-app -l app=gameserver
        echo "--- Recent Events ---"
        kubectl get events -n newtopia-app --sort-by='.lastTimestamp' | tail -20
      fi

deploy:gameserver:manual:
  stage: deploy
  <<: *kube_base
  needs:
    - job: build:gameserver:auto
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never
  script:
    - cd ./kubernetes/app
    - sed -i "s|CI_COMMIT_SHA|$CI_COMMIT_SHA|g" gameserver-workload.yaml
    - kubectl apply -f gameserver-workload.yaml
    - kubectl rollout status deployment/gameserver -n newtopia-app --timeout=300s

