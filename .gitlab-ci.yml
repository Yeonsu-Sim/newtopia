stages: 
  - test
  - build
  - deploy

variables:
  FRONTEND_DOCKER_IMAGE: "$DOCKER_HUB_USER/frontend-app"
  GAMESERVER_DOCKER_IMAGE: "$DOCKER_HUB_USER/gameserver-app"
  NEWS_CRAWLER_DOCKER_IMAGE: "$DOCKER_HUB_USER/crawler-app"
  DATA_PIPELINE_DOCKER_IMAGE: "$DOCKER_HUB_USER/data-pipeline"
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

build:gameserver:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - runner
  rules:
  - if: '$CI_COMMIT_BRANCH == "master"'
    changes:
      - "gameserver/**/*"
    when: on_success
  - if: '$CI_COMMIT_BRANCH == "master"'
    when: manual
  - when: never
  variables:
    GIT_STRATEGY: clone
    DOCKER_BUILDKIT: 1
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n $DOCKER_HUB_USER:$DOCKER_HUB_TOKEN | base64)\"}}}" > /kaniko/.docker/config.json
  script:
    - cd gameserver
    - /kaniko/executor
        --context .
        --dockerfile Dockerfile
        --destination $GAMESERVER_DOCKER_IMAGE:$CI_COMMIT_SHA
        --destination $GAMESERVER_DOCKER_IMAGE:latest
        --cache=true
        --cache-repo $GAMESERVER_DOCKER_IMAGE-cache
        --cache-ttl=300h
        --snapshotMode=redo
        --cache-copy-layers

build:frontend:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - runner
  rules:
  - if: '$CI_COMMIT_BRANCH == "master"'
    changes:
      - "frontend/**/*"
    when: on_success
  - if: '$CI_COMMIT_BRANCH == "master"'
