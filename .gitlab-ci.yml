stages: 
  - test
  - build
  - deploy

variables:
  FRONTEND_DOCKER_IMAGE: "$DOCKER_HUB_USER/frontend-app"
  GAMESERVER_DOCKER_IMAGE: "$DOCKER_HUB_USER/gameserver-app"
  NEWS_CRAWLER_DOCKER_IMAGE: "$DOCKER_HUB_USER/crawler-app"
  DATA_PIPELINE_DOCKER_IMAGE: "$DOCKER_HUB_USER/data-pipeline"
  GIT_STRATEGY: clone
  GIT_DEPTH: 0

# 통합된 빌드 작업 (MR과 master 모두 처리)
build:gameserver:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - runner
  rules:
    # MR에서 변경사항이 있을 때 실행
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "gameserver/**/*"
      when: on_success
    # master 브랜치에서 변경사항이 있을 때 실행
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - "gameserver/**/*"
      when: on_success
    # master 브랜치에서 수동 실행
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never
  variables:
    GIT_STRATEGY: clone
    DOCKER_BUILDKIT: 1
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n $DOCKER_HUB_USER:$DOCKER_HUB_TOKEN | base64)\"}}}" > /kaniko/.docker/config.json
  script:
    - cd gameserver
    - |
      if [ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]; then
        # MR에서는 테스트용 태그로 빌드 (실제 푸시)
        /kaniko/executor \
          --context . \
          --dockerfile Dockerfile \
          --destination $GAMESERVER_DOCKER_IMAGE:mr-$CI_MERGE_REQUEST_IID-$CI_COMMIT_SHORT_SHA \
          --cache=true \
          --cache-repo $GAMESERVER_DOCKER_IMAGE-cache \
          --cache-ttl=300h \
          --snapshotMode=redo \
          --cache-copy-layers
      else
        # master에서는 production 태그로 빌드
        /kaniko/executor \
          --context . \
          --dockerfile Dockerfile \
          --destination $GAMESERVER_DOCKER_IMAGE:$CI_COMMIT_SHA \
          --destination $GAMESERVER_DOCKER_IMAGE:latest \
          --cache=true \
          --cache-repo $GAMESERVER_DOCKER_IMAGE-cache \
          --cache-ttl=300h \
          --snapshotMode=redo \
          --cache-copy-layers
      fi

