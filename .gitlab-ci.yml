  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(echo -n $DOCKER_HUB_USER:$DOCKER_HUB_TOKEN | base64)\"}}}" > /kaniko/.docker/config.json
  script:
    - cd frontend
    - /kaniko/executor
        --context .
        --dockerfile Dockerfile
        --destination $FRONTEND_DOCKER_IMAGE:$CI_COMMIT_SHA
        --destination $FRONTEND_DOCKER_IMAGE:latest
        --build-arg NGINX_CONF=$NGINX_CONF
        --cache=true
        --cache-repo $FRONTEND_DOCKER_IMAGE-cache
        --cache-ttl=300h
        --snapshotMode=redo
        --cache-copy-layers

