# Master 브랜치에서 MR 이미지를 promotion하는 작업
promote:gameserver:
  stage: deploy
  image: gcr.io/go-containerregistry/crane:debug
  tags:
    - runner
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - "gameserver/**/*"
      when: on_success
  variables:
    SOURCE_TAG: "mr-$CI_MERGE_REQUEST_IID-$CI_COMMIT_SHORT_SHA"
  before_script:
    - echo "$DOCKER_HUB_TOKEN" | crane auth login index.docker.io -u "$DOCKER_HUB_USER" --password-stdin
  script:
    - |
      # MR에서 빌드된 이미지가 있는지 확인하고 promotion
      if crane manifest $GAMESERVER_DOCKER_IMAGE:$SOURCE_TAG > /dev/null 2>&1; then
        echo "Promoting MR image to production tags..."
        crane tag $GAMESERVER_DOCKER_IMAGE:$SOURCE_TAG $CI_COMMIT_SHA
        crane tag $GAMESERVER_DOCKER_IMAGE:$SOURCE_TAG latest
        echo "Image promotion completed"
      else
        echo "MR image not found, this might be a direct push to master"
      fi
  allow_failure: true

promote:frontend:
  stage: deploy
  image: gcr.io/go-containerregistry/crane:debug
  tags:
    - runner
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
