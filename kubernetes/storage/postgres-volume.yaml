apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  labels:
    app: newtopia-db
    component: postgres
spec:
  storageClassName: nfs-storage
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 172.26.14.247
    path: "/nfs/postgres-data"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: newtopia-db
  labels:
    app: newtopia-db
    component: postgres
spec:
  storageClassName: nfs-storage
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: newtopia-db
      component: postgres