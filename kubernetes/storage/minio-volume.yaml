apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-pv
  labels:
    app: newtopia-minio
    component: minio
spec:
  storageClassName: nfs-storage
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 172.26.14.247
    path: "/nfs/minio-data"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: newtopia-minio
  labels:
    app: newtopia-minio
    component: minio
spec:
  storageClassName: nfs-storage
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  selector:
    matchLabels:
      app: newtopia-minio
      component: minio