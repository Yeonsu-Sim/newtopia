apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: newtopia-kafka-cluster
  namespace: newtopia-kafka
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: "enabled"
spec:
  kafka:
    version: 4.0.0
    replicas: 3
    listeners:
      - name: internal
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: kraft-dual-role
  namespace: newtopia-kafka
  labels:
    strimzi.io/cluster: newtopia-kafka-cluster
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 20Gi
        class: nfs-storage
        deleteClaim: false
