apiVersion: v1
kind: Namespace
metadata:
  name: gitlab-agent-newtopia-k3s-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-agent
  namespace: gitlab-agent-newtopia-k3s-agent
  labels:
    app: gitlab-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab-agent
  template:
    metadata:
      labels:
        app: gitlab-agent
    spec:
      nodeSelector:
        location: aws
      serviceAccountName: gitlab-agent
      containers:
      - name: agent
        image: registry.gitlab.com/gitlab-org/cluster-integration/gitlab-agent/agentk:v18.0.2
        args:
        - --token-file=/config/token
        - --kas-address=wss://lab.ssafy.com/-/kubernetes-agent/
        env:
        - name: GL_PROJECT_PATH
          value: "s13-bigdata-dist-sub1/S13P21C203"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: token-volume
          mountPath: /config
          readOnly: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: token-volume
        secret:
          secretName: gitlab-agent-token
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-agent
  namespace: gitlab-agent-newtopia-k3s-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitlab-agent
rules:
- apiGroups: [""]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["apps"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["networking.k8s.io"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["extensions"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitlab-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitlab-agent
subjects:
- kind: ServiceAccount
  name: gitlab-agent
  namespace: gitlab-agent-newtopia-k3s-agent