services:
  crawling-server:
    build:
      context: ./news-crawler
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "18080:8080"

  gameserver:
    build:
      context: ./gameserver
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"

  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: newtopia
      POSTGRES_PASSWORD: newtopia
      POSTGRES_DB: newtopia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:9094"
    environment:
      # 단일 노드 KRaft(브로커 + 컨트롤러)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # PLAINTEXT는 보안이 전혀 적용되지 않은 기본 통신 방식(개발 환경)
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # KRaft 컨트롤러 투표자 설정
      # 형식 <node.id>@<호스트이름>:<컨트롤러포트>
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 지표가 4개니까 일단 4개의 파티션으로 구성함
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_CLUSTER_ID: uI49jfNfQhezRFcsn33ebw

    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  spark:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    image: spark-rawtoclean:latest
    container_name: spark
    restart: unless-stopped
    ports:
      - "4040:4040"
    depends_on:
      - kafka
      - minio
      - minio-mc
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SRC_TOPIC: newtopia.news.raw
      DST_TOPIC: newtopia.news.clean
      CHECKPOINT_DIR: s3a://newtopia/ckpt/raw_to_clean
      INDEX_BASE: s3a://newtopia/index/simhash
      INDEX_TTL_DAYS: 7   
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      HAMMING_THRESH: 4
      BANDS: 8
      BBITS: 8
    volumes:
      - spark_ivy_cache:/tmp/.ivy2

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 콘솔 UI
    volumes:
      - minio_data:/data

  # 한 번 실행돼서 버킷 만들어주는 init 컨테이너
  minio-mc:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      set -e
      mc alias set localminio http://minio:9000 minio minio123 &&
      mc mb -p localminio/newtopia &&
      mc ilm rule add --id=expire-data-7d --prefix data/ --expire-days=7 localminio/newtopia &&
      echo 'MinIO ILM: newtopia(data/ 7d), newtopia-ckpt(no ILM)' "
    restart: "no"

  analyzer-worker:
    build:
      context: ./data-pipeline
      dockerfile: workers/analyzer-worker/Dockerfile
    container_name: analyzer-worker
    restart: unless-stopped
    depends_on:
      - kafka
      - minio
    gpus: all
    user: "1000:1000"
    environment:
      # === Kafka ===
      KAFKA_BOOTSTRAP: kafka:9092
      SRC_TOPIC: newtopia.news.clean
      DST_TOPIC: newtopia.news.analyzed
      DLQ_TOPIC: newtopia.news.clean.dlq
      GROUP_ID: newtopia.analyzer.v1
      AUTO_OFFSET_RESET: earliest

      # === MinIO ===
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: newtopia
      S3_REGION: us-east-1
      S3_PATH_STYLE: "true"
      S3_SSL_ENABLED: "false"

      # === 저장/필터 ===
      S3_PREFIX_ANALYZED: news/analyzed
      S3_PREFIX_REJECTED: news/rejected
      S3_PREFIX_DLQ: news/dlq/topic=newtopia.news.clean
      ACCEPTED_MAJORS: economy,defense,publicSentiment,environment
      MIN_MAJOR_CONF: "0.60"
      SAVE_REJECTED_TO_MINIO: "true"

      # === 모델/런타임 ===
      PYTHONPATH: /app/src:/app:/app/common
      TOKENIZERS_PARALLELISM: "false"
      OMP_NUM_THREADS: "1"
      TZ: Asia/Seoul

      HF_HOME: /app/.cache/huggingface

      MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      MIN_MINOR_CONF: "0.60" # 카테고리 분류 시 최소 조건
      CLASSIFY_MAX_WORKERS: "4" # 분류 테스크를 동시에 처리할 프로세스 워커 수

      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    volumes:
      - ./data-pipeline/workers/analyzer-worker/src:/app/src
      - ./data-pipeline/common:/app/common
      - hf_cache:/app/.cache/huggingface

    working_dir: /app/src
    command: ["python", "-m", "worker"]

  sentiment-worker:
    build:
      context: ./data-pipeline
      dockerfile: workers/sentiment-worker/Dockerfile
    container_name: sentiment-worker
    image: newtopia/sentiment-worker:latest
    restart: unless-stopped
    depends_on:
      - kafka
      - minio
    gpus: all
    user: "1000:1000"
    environment:
      # === Kafka ===
      KAFKA_BOOTSTRAP: kafka:9092
      SRC_TOPIC: newtopia.news.analyzed
      DST_TOPIC: newtopia.news.sentiment
      DLQ_TOPIC: newtopia.news.sentiment.dlq
      GROUP_ID: newtopia.sentiment.v1
      AUTO_OFFSET_RESET: earliest
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      KAFKA_SASL_MECHANISM: ""
      KAFKA_SASL_JAAS: ""

      # === MinIO / S3 === (BaseConfig + 확장)
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: newtopia
      S3_REGION: us-east-1
      S3_PATH_STYLE: "true"
      S3_SSL_ENABLED: "false"
      # sentiment 스냅샷 저장 prefix
      S3_PREFIX_SENTIMENT: news/sentiment
      S3_PREFIX_DLQ: news/dlq/topic=newtopia.news.sentiment

      # === 모델/런타임 ===
      PYTHONPATH: /app/src:/app:/app/common
      TOKENIZERS_PARALLELISM: "false"
      OMP_NUM_THREADS: "1"
      TZ: Asia/Seoul

      HF_HOME: /app/.cache/huggingface

      MODEL_NAME: snunlp/KR-FinBert-SC
      USE_CUDA: "true"
      BATCH_SIZE: "32"
      MAX_CONTENT_LEN: "4000"
      POLL_TIMEOUT_MS: "1000"
      SEND_RETRIES: "2"
      SEND_BACKOFF_MS: "400"
      MAX_SEQ_LEN_TOKENS: "256"
      SLIDING_STRIDE_TOKENS: "128"
      PRODUCER_COMPRESSION: "lz4"

      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    volumes:
      - ./data-pipeline/workers/sentiment-worker/src:/app/src
      - ./data-pipeline/common:/app/common
      - hf_cache:/app/.cache/huggingface

    working_dir: /app/src
    command: ["python", "-m", "worker"]


    # 모니터링을 하기 위한 promethues , grafana
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"  # 포트 충돌 방지
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

      
volumes:
  redis_data:
  postgres_data:
  kafka_data:
  minio_data:
  spark_ivy_cache:
  hf_cache:
  prometheus_data:
  grafana_data:
