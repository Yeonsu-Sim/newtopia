spring:
  application:
    name: gameserver

  profiles:
    active: local

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
        "[default_batch_fetch_size]": 500
        "[highlight_sql]": true


management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
      base-path: /actuator    # 기본값
  endpoint:
    health:
      show-details: "when_authorized"

app:
  storage:
    local:
      base-dir: C:/var/app/uploads
      public-base-url: http://localhost:8080/files