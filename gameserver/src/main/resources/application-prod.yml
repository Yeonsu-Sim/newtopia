spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20         # 운영에서는 풀 크기 더 크게
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create  # TODO: 임시 설정 수거 -> none

  sql:
    init:
      mode: always  # TODO: 임시 설정 수거 -> never
      data-locations: classpath:sql/data.sql


  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

    properties:
      spring.json.trusted.packages: "*"

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP}
      auto-offset-reset: latest      # 운영은 보통 latest (새 메시지부터 소비)
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        compression.type: zstd
        linger.ms: 10
        batch.size: 131072           # 128KB로 확대, 대량 처리 대비

  listener:
    ack-mode: record

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000      # 15분 (15 * 60 * 1000)
  refresh-token-expiration: 604800000  # 7일 (7 * 24 * 60 * 60 * 1000)

# 쿠키 설정
cookie:
  secure: true
  same-site: "Lax"
  access-token-name: "ACCESS_TOKEN"
  refresh-token-name: "REFRESH_TOKEN"
app:
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      bucket-name: ${MINIO_BUCKET_NAME}
      public-base-url: ${MINIO_PUBLIC_BASE_URL}
